kind = "web"
previewPath = "/"
title = "ID Creator Bot Dashboard"
version = "1.0.0"
id = "artifacts/id-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21739

[services.development]
run = "pnpm --filter @workspace/id-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/id-bot", "run", "build" ]
publicDir = "artifacts/id-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21739"
BASE_PATH = "/"
